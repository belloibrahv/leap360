# Render Blueprint for Leap360
# Deploy: Connect your GitHub repo to Render and it will auto-detect this file
# Database is now managed by Render (automatic connection injection)

databases:
  # PostgreSQL Database
  - name: leap360-db
    databaseName: leap360
    user: leap360
    plan: free
    # Free tier: 90 days, 256MB RAM, 1GB storage
    # After 90 days, upgrade to Starter ($7/month) or migrate to Supabase

services:
  # Backend API Service (FastAPI)
  - type: web
    name: leap360-api
    runtime: docker
    dockerfilePath: ./ops/remote/Dockerfile.web
    dockerContext: ./kernel/web
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leap360-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: '["https://leap360-client.onrender.com"]'
        # Update this after deploying to match your actual client URL
    autoDeploy: true

  # Frontend Client Service (Next.js)
  - type: web
    name: leap360-client
    runtime: docker
    dockerfilePath: ./ops/remote/Dockerfile.client
    dockerContext: ./kernel/client
    plan: free
    envVars:
      - key: NEXT_PUBLIC_LEAP360_API_BASE_URL
        value: https://leap360-api.onrender.com
        # Update this if you change the API service name
        # Note: Set this as a build-time env var in Render dashboard for Next.js builds
    autoDeploy: true
